services:
  - type: web
    name: neomeet-backend
    runtime: node
    plan: free # or your preferred plan
    region: oregon # choose the region closest to you
    # This points Render to the subfolder
    rootDir: NeoMeet-AI/backend 
    buildCommand: npm install
    startCommand: node src/app.js # Adjust this to your main file path (e.g., node server.js)
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: PORT
        value: 8000
      - key: MONGODB_URI
        generateValue: false # Set this value in the Render Dashboard for security
      - key: FRONTEND_URL
        value: https://neon-meet-brown.vercel.app